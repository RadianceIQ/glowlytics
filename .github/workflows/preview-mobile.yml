name: PR Preview Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'RadianceIQ/app/**'
      - 'RadianceIQ/src/**'
      - 'RadianceIQ/assets/**'
      - 'RadianceIQ/app.json'
      - 'RadianceIQ/package.json'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RadianceIQ/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: RadianceIQ

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview
        working-directory: RadianceIQ
        run: |
          eas build \
            --platform all \
            --profile preview \
            --non-interactive \
            --no-wait

      - name: Comment PR with build link
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📱 Preview build triggered on EAS. Check [Expo dashboard](https://expo.dev/accounts/mufasabrownie/projects/glowlytics/builds) for status.'
            })
