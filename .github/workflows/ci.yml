name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: TypeScript + Jest ───────────────────────────────
  frontend-check:
    name: Frontend · Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RadianceIQ
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RadianceIQ/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm test -- --ci --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: RadianceIQ/coverage/
          retention-days: 7

  # ─── Backend: Jest + Supertest ─────────────────────────────────
  backend-check:
    name: Backend · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RadianceIQ/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RadianceIQ/backend/package-lock.json
      - run: npm ci
      - run: npm test -- --ci --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: RadianceIQ/backend/coverage/
          retention-days: 7

  # ─── ONNX Model Availability Check ────────────────────────────
  model-check:
    name: ML · Verify Model URLs
    runs-on: ubuntu-latest
    steps:
      - name: Check skin_signals_v2.onnx
        run: |
          HTTP_CODE=$(curl -sL -o /dev/null -w '%{http_code}' \
            'https://huggingface.co/mufasabrownie/glowlytics-skin-models/resolve/main/skin_signals_v2.onnx')
          echo "skin_signals_v2.onnx → HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]
      - name: Check acne_detector.onnx
        run: |
          HTTP_CODE=$(curl -sL -o /dev/null -w '%{http_code}' \
            'https://huggingface.co/mufasabrownie/glowlytics-skin-models/resolve/main/acne_detector.onnx')
          echo "acne_detector.onnx → HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]
